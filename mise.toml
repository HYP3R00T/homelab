[tools]
cloudflared = "latest"
flux2 = "latest"
helm = "latest"
prek = "latest"
rumdl = "latest"
terraform = "latest"
uv = "latest"
vault = "latest"

[settings]
experimental = true

[env]
_.file = '.env' # for sensitive data

[shell_alias]
k = "kubectl"
tf = "terraform"

[hooks]
enter = "{{config_root}}/scripts/enter_project.sh"

[tasks.docs]
run = "uvx zensical serve"
description = "Serve the documentation locally"
