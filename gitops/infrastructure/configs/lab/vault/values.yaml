# values.yaml — modified for HA+Raft but with old-UI bootstrap behaviour restored

global:
  enabled: true
  tlsDisable: true

injector:
  # Single-node clusters can't satisfy the injector's default hard anti-affinity
  # during rolling updates, so replace the pod before creating the next one.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

server:
  # In this single-node homelab, automatic restarts are easier to reason about
  # than OnDelete because Flux/Helm changes should take effect without a manual
  # pod deletion step.
  updateStrategyType: RollingUpdate

  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }

  # You can temporarily disable liveness while bootstrapping if needed,
  # but leaving enabled with conservative settings is reasonable.
  readinessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
    failureThreshold: 10

  livenessProbe:
    enabled: true
    # Keep the pod alive while Vault is sealed so the UI init/unseal flow
    # is not interrupted by kubelet restarts during first-time bootstrap.
    path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 6

  # The chart expects pod/container security contexts under separate keys.
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 1000
      fsGroup: 1000
    container:
      allowPrivilegeEscalation: false

  standalone:
    enabled: false

  ha:
    enabled: true
    replicas: 1
    # make Vault advertise an externally-consistent api_addr for the UI/ingress
    apiAddr: "http://vault.homelab.internal"
    raft:
      enabled: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          telemetry {
            unauthenticated_metrics_access = "true"
          }
        }

        storage "raft" {
          path = "/data/vault"
        }

  dataStorage:
    enabled: false

  extraInitContainers:
    - name: vault-permissions
      image: busybox:1.36
      command:
        - sh
        - -c
        - mkdir -p /data/vault && chown -R 100:1000 /data/vault && chmod 0770 /data/vault
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        allowPrivilegeEscalation: false
      volumeMounts:
        - name: vault-data
          mountPath: /data/vault

  volumes:
    - name: vault-data
      persistentVolumeClaim:
        claimName: vault-data

  volumeMounts:
    - name: vault-data
      mountPath: /data/vault

  ingress:
    enabled: true
    ingressClassName: "traefik"

    # IMPORTANT: set activeService=false so the chart will not switch the ingress to vault-active,
    # and ensure the ingress backend targets the 'vault' API service directly.
    activeService: false

    hosts:
      - host: vault.homelab.internal
        extraPaths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault # direct API service (ensures UI sees the same /v1/sys/health)
                port:
                  number: 8200

# Vault UI
ui:
  enabled: true
  serviceType: "ClusterIP"
  # expose the UI on the same port as the API so ingress routing is straightforward
  externalPort: 8200
  targetPort: 8200
  # during bootstrap it's useful to allow not-ready addresses — keep if you want ingress
  # to reach pod while it's NotReady (optional; remove after bootstrap if desired)
  publishNotReadyAddresses: true
