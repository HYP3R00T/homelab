apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg
spec:
  interval: 5m
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.29.0
      sourceRef:
        kind: HelmRepository
        name: charts
        namespace: cnpg
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: cnpg-values
      valuesKey: values.yaml
