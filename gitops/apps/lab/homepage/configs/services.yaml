- Applications:
    - Linkding:
        icon: linkding.png
        href: http://linkding.homelab.internal/
        siteMonitor: http://linkding-service.linkding.svc.cluster.local:9090
        target: _self

- Infrastructure & Monitoring:
    - Flux Operator:
        icon: flux-operator.png
        href: http://flux.homelab.internal/
        target: _self
    - Vault:
        icon: vault.png
        href: http://vault.homelab.internal/
        siteMonitor: http://vault.vault.svc.cluster.local:8200/v1/sys/health
        target: _self
    - Traefik:
        icon: traefik-proxy.png
        href: http://traefik.homelab.internal/
        target: _self
        widget:
          type: traefik
          url: http://traefik.traefik.svc.cluster.local
          fields: ["routers", "services", "middleware"]
          headers:
            Host: traefik.homelab.internal
    - Grafana:
        icon: grafana.png
        href: http://grafana.homelab.internal/
        siteMonitor: http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local/api/health
        target: _self
    - Prometheus:
        icon: prometheus.png
        href: http://prometheus.homelab.internal/
        siteMonitor: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/-/healthy
        target: _self
        widget:
          type: prometheus
          url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          fields: ["targets_up", "targets_down", "targets_total"]

