apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
resources:
  - ../../base/metrics-server/
  - kubelet-ca-config-map.yaml

patches:
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: metrics-server
    path: helm-release-patch.yaml

configMapGenerator:
  - name: metrics-server-values
    files:
      - values.yaml

generatorOptions:
  disableNameSuffixHash: true
