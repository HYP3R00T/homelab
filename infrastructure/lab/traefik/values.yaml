hostNetwork: false
ports:
  web:
    port: 8000
    hostPort: 80
  websecure:
    port: 8443
    hostPort: 443
ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik
ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.homelab.internal`)
    entryPoints:
      - web
providers:
  kubernetesIngress:
    publishedService:
      enabled: false
