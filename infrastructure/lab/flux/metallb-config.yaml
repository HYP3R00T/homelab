apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-config
  namespace: flux-system
spec:
  interval: 1m0s
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: infrastructure-core
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/lab/metallb-config
  prune: true
