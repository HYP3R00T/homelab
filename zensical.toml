[project]
site_name = "Homelab"
site_description = "A production-grade, self-hosted Kubernetes homelab powered by Talos Linux and FluxCD."
repo_name = "HYP3R00T/homelab"
repo_url = "https://github.com/HYP3R00T/homelab"
site_author = "Rajesh Das"
copyright = "Copyright &copy; 2026 Rajesh Das"

nav = [
  { Home = "index.md" },
  { Architecture = [
    { Overview = "architecture/index.md" },
    { "Secrets Flow" = "architecture/secrets-flow.md" },
  ] },
  { GitOps = [
    { Overview = "gitops/index.md" },
    { "Repository Structure" = "gitops/repository-structure.md" },
    { Reconciliation = "gitops/reconciliation.md" },
    { "Adding a Service" = "gitops/adding-a-service.md" },
  ] },
  { Services = [
    { Overview = "services/index.md" },
    { Vault = "services/vault.md" },
    { "External Secrets" = "services/external-secrets.md" },
    { Cloudflared = "services/cloudflared.md" },
  ] },
  { Runbooks = [
    { Overview = "runbooks/index.md" },
    { "Bootstrap Vault" = "runbooks/vault-bootstrap.md" },
    { "Recover Vault" = "runbooks/vault-recovery.md" },
    { "Create Cloudflared Tunnel" = "runbooks/cloudflared-tunnel.md" },
    { "Store Cloudflared Credentials" = "runbooks/cloudflared-vault-credentials.md" },
  ] },
]

[project.theme]
language = "en"
favicon = "assets/favicon.svg"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
]

[[project.theme.palette]]
scheme = "default"
palette.accent = "teal"
palette.primary = "teal"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
palette.accent = "teal"
palette.primary = "teal"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
logo = "lucide/laptop-minimal"
previous = "lucide/arrow-left"
next = "lucide/arrow-right"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.keys]
